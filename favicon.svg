<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Glow effect for text -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Black background -->
  <rect width="100" height="100" fill="#000000" rx="15"/>
  
  <!-- Grid pattern overlay -->
  <path d="M 25 0 L 25 100 M 50 0 L 50 100 M 75 0 L 75 100 M 0 25 L 100 25 M 0 50 L 100 50 M 0 75 L 100 75" 
        stroke="#1e40af" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Corner accents -->
  <path d="M 10 10 L 20 10 L 20 12 L 12 12 L 12 20 L 10 20 Z" fill="#3b82f6"/>
  <path d="M 90 10 L 80 10 L 80 12 L 88 12 L 88 20 L 90 20 Z" fill="#3b82f6"/>
  
  <!-- CC text with monospace feel and glow -->
  <text x="50" y="68" font-family="'Courier New', Consolas, monospace" font-size="48" font-weight="700" 
        fill="#3b82f6" text-anchor="middle" filter="url(#glow)">cc</text>
</svg>
